version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  user: "${AIRFLOW_UID:-50000}:0"
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-your-fernet-key-here-change-me-1234567890abcdef}
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
    MLFLOW_TRACKING_URI: http://mlflow:5000
    REDIS_HOST: redis
    REDIS_PORT: 6379
    REDIS_PASSWORD: ${REDIS_PASSWORD:-recsys_redis_pass}
    _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-docker"
  volumes:
    - ../dags:/opt/airflow/dags
    - ../data:/opt/airflow/data
    - airflow-logs:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock  # для DockerOperator
  depends_on:
    airflow-db:
      condition: service_healthy
  networks:
    - recsys

services:
  airflow-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      retries: 5
    networks:
      - recsys

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-db-data:
  airflow-logs:

networks:
  recsys:
    name: recsys
    driver: bridge
