version: "3.8"

services:
  triton:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    command: >
      bash -c "pip install catboost &&
      tritonserver --model-repository=/models"
    volumes:
      - ./triton_models:/models
    ports:
      - "8010:8000"   # HTTP
      - "8011:8001"   # gRPC
      - "8012:8002"   # Metrics
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/v2/health/ready"]
      interval: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - recsys

networks:
  recsys:
    name: recsys
    driver: bridge
