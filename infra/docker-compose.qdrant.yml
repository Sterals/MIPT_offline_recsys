version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:6333/healthz"]
      interval: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - recsys

volumes:
  qdrant-data:

networks:
  recsys:
    name: recsys
    driver: bridge
