version: "3.8"

services:
  recs-api:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: recsys_redis_pass
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - recsys

  ab-splitter:
    build:
      context: ..
      dockerfile: Dockerfile.splitter
    environment:
      RECS_API_URL: http://recs-api:8000
      AB_CONFIG_PATH: config_ab.yaml
      AB_LOG_PATH: /logs/ab_log.csv
    volumes:
      - ../logs:/logs
    ports:
      - "8001:8001"
    restart: unless-stopped
    depends_on:
      - recs-api
    networks:
      - recsys

networks:
  recsys:
    name: recsys
    external: true
